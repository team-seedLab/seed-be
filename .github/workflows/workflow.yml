name: SEED 자동 배포 파이프라인

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 소스 코드 가져오기
        uses: actions/checkout@v4

      - name: 자바 21 설정
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: 그레이들 실행 권한 부여
        run: chmod +x ./gradlew

      - name: 프로젝트 빌드
        run: ./gradlew clean build

      - name: GHCR 로그인
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: QEMU 설치 (멀티 아키텍처 빌드용)
        uses: docker/setup-qemu-action@v3

      - name: 도커 이미지 생성 및 푸시
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker build --platform linux/arm64 -t ghcr.io/$REPO/seed-backend-prod-server:latest .
          docker push ghcr.io/$REPO/seed-backend-prod-server:latest

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    env:
      PROD_DATASOURCE_URL: ${{ secrets.PROD_DATASOURCE_URL }}
      PROD_DATASOURCE_USERNAME: ${{ secrets.PROD_DATASOURCE_USERNAME }}
      PROD_DATASOURCE_PASSWORD: ${{ secrets.PROD_DATASOURCE_PASSWORD }}
      KAKAO_CLIENT_ID: ${{ secrets.KAKAO_CLIENT_ID }}
      KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
      GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
      GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
    steps:
      - name: 소스 코드 가져오기
        uses: actions/checkout@v4

      - name: 라즈베리파이에서 GHCR 로그인
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: 도커 이미지 이름 설정
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "BACKEND_IMAGE=ghcr.io/$REPO/seed-backend-prod-server:latest" >> "$GITHUB_ENV"

      - name: 도커 컴포즈 파일 배포
        run: |
          mkdir -p /home/junsik/seed
          cp docker-compose.prod.yml /home/junsik/seed/docker-compose.prod.yml

      - name: 도커 컴포즈 실행
        run: |
          docker compose -f /home/junsik/seed/docker-compose.prod.yml pull
          docker compose -f /home/junsik/seed/docker-compose.prod.yml up -d
          docker image prune -f
