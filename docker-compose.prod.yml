services:
  seed-backend-prod-server:
    image: ghcr.io/${GITHUB_REPOSITORY}/seed-backend-prod-server:latest
    container_name: seed-backend-prod-server
    restart: always
    ports:
      - "8081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - PROD_DATASOURCE_URL=${PROD_DATASOURCE_URL}
      - PROD_DATASOURCE_USERNAME=${PROD_DATASOURCE_USERNAME}
      - PROD_DATASOURCE_PASSWORD=${PROD_DATASOURCE_PASSWORD}
      - SPRING_DATA_REDIS_HOST=seed-cache-prod-server
      - KAKAO_CLIENT_ID=${KAKAO_CLIENT_ID}
      - KAKAO_CLIENT_SECRET=${KAKAO_CLIENT_SECRET}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - JWT_SECRET=${JWT_SECRET}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    deploy:
      resources:
        limits:
          memory: 3G
    depends_on:
      seed-cache-prod-server:
        condition: service_healthy

  seed-cache-prod-server:
    image: redis
    container_name: seed-cache-prod-server
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./redis/data:/data
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      retries: 10
