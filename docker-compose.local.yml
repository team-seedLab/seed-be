services:
  seed-backend-local-server:
    build: .
    container_name: seed-backend-local-server
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - SPRING_DATA_REDIS_HOST=seed-cache-local-server
    depends_on:
      seed-cache-server:
        condition: service_healthy

  seed-cache-server:
    image: redis
    container_name: seed-cache-local-server
    ports:
      - "6379:6379"
    volumes:
      - ./redis/data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      retries: 10


